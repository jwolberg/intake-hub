# Local-first topology (ARCHITECTURE.md §17). Brings up db + api + hub plus the
# mcp-reference and mock-clinrun stub services. The async worker is deferred
# (Open Decision OD-3: MVP may run synchronously).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: invoicescreener
      POSTGRES_PASSWORD: invoicescreener
      POSTGRES_DB: invoicescreener
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoicescreener"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://invoicescreener:invoicescreener@db:5432/invoicescreener
      MCP_REFERENCE_URL: http://mcp-reference:8100
      CLINRUN_URL: http://mock-clinrun:8200
      # OD-2 real LLM provider. Read from the host env at `up` time; empty →
      # offline stand-in (network-free default). Export it from the Keychain:
      #   ANTHROPIC_API_KEY="$(security find-generic-password \
      #     -s ledgerrun-ANTHROPIC_API_KEY -w)" docker compose up -d --build api
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      mcp-reference:
        condition: service_started
      mock-clinrun:
        condition: service_started

  mcp-reference:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      ["uvicorn", "backend.clients.stub_servers.mcp_app:app", "--host", "0.0.0.0", "--port", "8100"]
    ports:
      - "8100:8100"

  mock-clinrun:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      ["uvicorn", "backend.clients.stub_servers.clinrun_app:app", "--host", "0.0.0.0", "--port", "8200"]
    ports:
      - "8200:8200"

  hub:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  db_data:
