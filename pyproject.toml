# Repo-level dev tooling config (lint + test). Runtime deps live in
# backend/requirements.txt.

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["backend", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
